events {
    worker_connections 1024;
}

http {
    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name gini.tail3d4a2.ts.net;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name gini.tail3d4a2.ts.net;

        ssl_certificate /etc/nginx/certs/gini.crt;
        ssl_certificate_key /etc/nginx/certs/gini.key;

        # Frontend
        location / {
            proxy_pass http://gini-frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Backend API
        location /api/ {
            proxy_pass http://gini-backend:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Backend health
        location /health {
            proxy_pass http://gini-backend:8000/health;
        }

        # WebSocket
        location /ws/ {
            proxy_pass http://gini-backend:8000/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 300s;
        }
    }
}
